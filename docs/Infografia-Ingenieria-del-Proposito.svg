<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2400" viewBox="0 0 1400 2400" role="img" aria-labelledby="title desc">
  <title id="title">Infografia: Ingenieria del Proposito</title>
  <desc id="desc">Poster vertical que resume la Ingenieria del Proposito, sus cuatro horizontes y su flujo operativo.</desc>
  <defs>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#183b4e"/>
    </linearGradient>
    <linearGradient id="problem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="solution" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <style>
      .bg { fill: #f8f5ef; }
      .hero { fill: url(#hero); }
      .card { fill: #fffdf8; stroke: #d6d0c4; stroke-width: 2; }
      .problem { fill: url(#problem); stroke: #ef4444; stroke-width: 2; }
      .solution { fill: url(#solution); stroke: #0f766e; stroke-width: 2; }
      .dark { fill: #16202a; }
      .muted { fill: #4b5563; }
      .accent-red { fill: #b91c1c; }
      .accent-green { fill: #0f766e; }
      .line-red { stroke: #dc2626; stroke-width: 4; }
      .line-green { stroke: #0f766e; stroke-width: 4; }
      .line-dark { stroke: #16202a; stroke-width: 3; }
      .dash { stroke-dasharray: 10 10; }
      text { font-family: Arial, Helvetica, sans-serif; }
      .kicker { font-size: 24px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
      .h1 { font-size: 68px; font-weight: 800; }
      .h2 { font-size: 34px; font-weight: 800; }
      .h3 { font-size: 24px; font-weight: 800; }
      .body { font-size: 24px; font-weight: 500; }
      .small { font-size: 20px; font-weight: 500; }
      .mini { font-size: 18px; font-weight: 600; }
      .center { text-anchor: middle; }
      .right { text-anchor: end; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="2400"/>

  <rect class="hero" x="60" y="60" width="1280" height="290" rx="28"/>
  <text class="kicker center" x="700" y="125" fill="#f8fafc">LLMS · SOFTWARE · AGENCIA</text>
  <text class="h1 center" x="700" y="205" fill="#f8fafc">Ingenieria del Proposito</text>
  <text class="h2 center" x="700" y="255" fill="#dbeafe">Programar con LLMs sin caer en la tirania del contexto</text>
  <text class="body center" x="700" y="310" fill="#e5e7eb">El contexto explica de donde venimos. El proposito decide hacia donde vamos.</text>

  <rect class="problem" x="60" y="390" width="610" height="280" rx="24"/>
  <text class="h2" x="100" y="445" fill="#7f1d1d">El problema</text>
  <text class="body" x="100" y="495" fill="#7f1d1d">La tirania del contexto convierte al</text>
  <text class="body" x="100" y="530" fill="#7f1d1d">programador en bibliotecario de prompts.</text>
  <text class="small" x="100" y="585" fill="#7f1d1d">- mas archivos, mas tokens, mas ansiedad</text>
  <text class="small" x="100" y="615" fill="#7f1d1d">- respuestas localmente validas pero pobres</text>
  <text class="small" x="100" y="645" fill="#7f1d1d">- perdida de agencia y criterio</text>

  <rect class="solution" x="730" y="390" width="610" height="280" rx="24"/>
  <text class="h2" x="770" y="445" fill="#134e4a">El giro</text>
  <text class="body" x="770" y="495" fill="#134e4a">No empezar por preguntar</text>
  <text class="body" x="770" y="530" fill="#134e4a">"que contexto le doy al modelo?"</text>
  <text class="body" x="770" y="580" fill="#134e4a">Empezar por preguntar</text>
  <text class="body" x="770" y="615" fill="#134e4a">"para que existe este cambio?"</text>
  <text class="small" x="770" y="650" fill="#134e4a">Proposito primero. Contexto despues.</text>

  <line class="line-dark" x1="700" y1="710" x2="700" y2="790"/>
  <polygon points="700,820 680,780 720,780" fill="#16202a"/>

  <text class="h2 center dark" x="700" y="875">Cambio de modelo</text>
  <rect class="card" x="120" y="910" width="500" height="210" rx="24"/>
  <text class="h3" x="160" y="965" fill="#b91c1c">Contexto primero</text>
  <text class="body" x="160" y="1015" fill="#16202a">1. Reunir archivos</text>
  <text class="body" x="160" y="1050" fill="#16202a">2. Volcar historial</text>
  <text class="body" x="160" y="1085" fill="#16202a">3. Esperar que el modelo acierte</text>

  <line class="line-red dash" x1="640" y1="1015" x2="770" y2="1015"/>
  <text class="mini center" x="705" y="995" fill="#b91c1c">ruido</text>

  <rect class="card" x="780" y="910" width="500" height="210" rx="24"/>
  <text class="h3" x="820" y="965" fill="#0f766e">Proposito primero</text>
  <text class="body" x="820" y="1015" fill="#16202a">1. Definir el fin</text>
  <text class="body" x="820" y="1050" fill="#16202a">2. Fijar principios y limites</text>
  <text class="body" x="820" y="1085" fill="#16202a">3. Aportar contexto minimo</text>

  <text class="h2 center dark" x="700" y="1195">Los cuatro horizontes</text>

  <rect class="card" x="80" y="1235" width="285" height="260" rx="24"/>
  <circle cx="150" cy="1310" r="34" fill="#dbeafe"/>
  <text class="h3" x="205" y="1318" fill="#1d4ed8">1. Funcional</text>
  <text class="small" x="110" y="1375" fill="#16202a">Que problema desaparece</text>
  <text class="small" x="110" y="1405" fill="#16202a">o que capacidad nueva</text>
  <text class="small" x="110" y="1435" fill="#16202a">adquiere el sistema.</text>

  <rect class="card" x="385" y="1235" width="285" height="260" rx="24"/>
  <circle cx="455" cy="1310" r="34" fill="#dcfce7"/>
  <text class="h3" x="510" y="1318" fill="#15803d">2. Arquitectonico</text>
  <text class="small" x="415" y="1375" fill="#16202a">Como debe sobrevivir</text>
  <text class="small" x="415" y="1405" fill="#16202a">la solucion sin convertirse</text>
  <text class="small" x="415" y="1435" fill="#16202a">en deuda tecnica.</text>

  <rect class="card" x="690" y="1235" width="285" height="260" rx="24"/>
  <circle cx="760" cy="1310" r="34" fill="#fee2e2"/>
  <text class="h3" x="815" y="1318" fill="#b91c1c">3. Restriccion</text>
  <text class="small" x="720" y="1375" fill="#16202a">Que no puede ocurrir</text>
  <text class="small" x="720" y="1405" fill="#16202a">aunque la solucion</text>
  <text class="small" x="720" y="1435" fill="#16202a">parezca funcionar.</text>

  <rect class="card" x="995" y="1235" width="325" height="260" rx="24"/>
  <circle cx="1065" cy="1310" r="34" fill="#ede9fe"/>
  <text class="h3" x="1120" y="1318" fill="#6d28d9">4. Autoria</text>
  <text class="small" x="1025" y="1375" fill="#16202a">Como debe leerse,</text>
  <text class="small" x="1025" y="1405" fill="#16202a">mantenerse y transmitir</text>
  <text class="small" x="1025" y="1435" fill="#16202a">intencion humana.</text>

  <text class="h2 center dark" x="700" y="1605">Flujo operativo</text>
  <line class="line-green" x1="180" y1="1710" x2="1220" y2="1710"/>

  <circle cx="180" cy="1710" r="44" fill="#0f766e"/>
  <text class="h3 center" x="180" y="1720" fill="#ffffff">1</text>
  <text class="mini center dark" x="180" y="1775">Definir</text>
  <text class="small center muted" x="180" y="1805">nombrar el cambio</text>

  <circle cx="440" cy="1710" r="44" fill="#0f766e"/>
  <text class="h3 center" x="440" y="1720" fill="#ffffff">2</text>
  <text class="mini center dark" x="440" y="1775">Filtrar</text>
  <text class="small center muted" x="440" y="1805">contexto minimo</text>

  <circle cx="700" cy="1710" r="44" fill="#0f766e"/>
  <text class="h3 center" x="700" y="1720" fill="#ffffff">3</text>
  <text class="mini center dark" x="700" y="1775">Ejecutar</text>
  <text class="small center muted" x="700" y="1805">propuesta del LLM</text>

  <circle cx="960" cy="1710" r="44" fill="#0f766e"/>
  <text class="h3 center" x="960" y="1720" fill="#ffffff">4</text>
  <text class="mini center dark" x="960" y="1775">Revisar</text>
  <text class="small center muted" x="960" y="1805">contra proposito</text>

  <circle cx="1220" cy="1710" r="44" fill="#0f766e"/>
  <text class="h3 center" x="1220" y="1720" fill="#ffffff">5</text>
  <text class="mini center dark" x="1220" y="1775">Aprender</text>
  <text class="small center muted" x="1220" y="1805">capturar patron</text>

  <rect class="card" x="80" y="1870" width="1240" height="250" rx="24"/>
  <text class="h2" x="120" y="1930" fill="#16202a">Del equipo al LLM</text>
  <text class="body" x="120" y="1980" fill="#16202a">Skill + slash commands + plantillas convierten la metodologia en una operacion repetible.</text>
  <text class="small" x="120" y="2030" fill="#4b5563">/purpose-brief -> crea ficha | /purpose-review -> revisa por horizontes | /purpose-retro -> captura aprendizaje</text>
  <text class="small" x="120" y="2070" fill="#4b5563">La IA deja de ser una caja negra hambrienta de contexto y pasa a ser una herramienta mejor gobernada.</text>

  <rect class="hero" x="60" y="2180" width="1280" height="160" rx="28"/>
  <text class="h2 center" x="700" y="2245" fill="#ffffff">Formula resumida</text>
  <text class="h2 center" x="700" y="2300" fill="#bbf7d0">Proposito claro + contexto minimo + evaluacion por horizontes = colaboracion util con LLMs</text>
</svg>
